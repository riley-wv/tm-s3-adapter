tunnel: <tunnel-uuid>
credentials-file: /etc/cloudflared/<tunnel-uuid>.json

ingress:
  # Host SSH daemon kept behind Cloudflare Access.
  - hostname: ssh.example.com
    service: ssh://localhost:22

  # tm-s3-adapter dashboard and admin API stay on loopback and are published through the tunnel.
  - hostname: admin.example.com
    service: http://localhost:8787

  - hostname: api.example.com
    service: http://localhost:8788

  # SMB and SFTP are intentionally not tunneled in the hybrid access profile.
  - service: http_status:404
