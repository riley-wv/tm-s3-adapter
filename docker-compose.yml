services:
  tm-adapter-vps:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: "${NODE_ENV:-production}"
        VPS_ADMIN_DASHBOARD_PORT: "${VPS_ADMIN_DASHBOARD_PORT:-8787}"
        VPS_ADMIN_API_PORT: "${VPS_ADMIN_API_PORT:-8788}"
        VPS_DATA_DIR: "${VPS_DATA_DIR:-/data/vps}"
        VPS_SMB_SHARE_ROOT: "${VPS_SMB_SHARE_ROOT:-/data/vps/smb-share}"
        VPS_ADMIN_WEB_ROOT: "${VPS_ADMIN_WEB_ROOT:-/app/web/vps-public}"
        VPS_API_TOKEN: "${VPS_API_TOKEN}"
        VPS_ADMIN_USERNAME: "${VPS_ADMIN_USERNAME}"
        VPS_ADMIN_PASSWORD: "${VPS_ADMIN_PASSWORD}"
        VPS_ADMIN_SESSION_SECONDS: "${VPS_ADMIN_SESSION_SECONDS:-43200}"
        VPS_SAMBA_MANAGE_ENABLED: "${VPS_SAMBA_MANAGE_ENABLED:-true}"
        VPS_SAMBA_STREAMS_BACKEND: "${VPS_SAMBA_STREAMS_BACKEND:-xattr}"
        VPS_SMB_PUBLIC_PORT: "${VPS_SMB_PUBLIC_PORT:-445}"
        VPS_SAMBA_CONF_DIR: "${VPS_SAMBA_CONF_DIR:-/etc/samba/smb.conf.d/tm-adapter}"
        VPS_SAMBA_MAIN_CONF: "${VPS_SAMBA_MAIN_CONF:-/etc/samba/smb.conf}"
        VPS_SAMBA_GENERATED_CONF: "${VPS_SAMBA_GENERATED_CONF:-/etc/samba/smb.conf.d/tm-adapter/_generated.conf}"
        VPS_SAMBA_INCLUDE_LINE: "${VPS_SAMBA_INCLUDE_LINE:-include = /etc/samba/smb.conf.d/tm-adapter/_generated.conf}"
        VPS_SAMBA_RESTART_CMD: "${VPS_SAMBA_RESTART_CMD:-smbcontrol all reload-config || pkill -HUP smbd || true}"
        VPS_MOUNT_MANAGE_ENABLED: "${VPS_MOUNT_MANAGE_ENABLED:-true}"
        VPS_MOUNT_POLL_SECONDS: "${VPS_MOUNT_POLL_SECONDS:-30}"
        VPS_RCLONE_CACHE_DIR: "${VPS_RCLONE_CACHE_DIR:-/data/vps/rclone-vfs-cache}"
        VPSD_RCLONE_BINARY: "${VPSD_RCLONE_BINARY:-rclone}"
        VPS_SFTP_PORT: "${VPS_SFTP_PORT:-2222}"
        VPS_SFTP_USERNAME: "${VPS_SFTP_USERNAME:-tmbackup}"
        VPS_SFTP_PASSWORD: "${VPS_SFTP_PASSWORD}"
        VPS_SFTP_UID: "${VPS_SFTP_UID:-10000}"
        VPS_SFTP_GID: "${VPS_SFTP_GID:-10000}"
        VPS_POSTGRES_HOST: "${VPS_POSTGRES_HOST:-postgres}"
        VPS_POSTGRES_PORT: "${VPS_POSTGRES_PORT:-5432}"
        VPS_POSTGRES_DATABASE: "${VPS_POSTGRES_DATABASE:-tm_adapter}"
        VPS_POSTGRES_USER: "${VPS_POSTGRES_USER:-tm_adapter}"
        VPS_POSTGRES_PASSWORD: "${VPS_POSTGRES_PASSWORD}"
        VPS_POSTGRES_SSL_MODE: "${VPS_POSTGRES_SSL_MODE:-disable}"
    container_name: tm-adapter-vps
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${VPS_ADMIN_DASHBOARD_PORT:-8787}:${VPS_ADMIN_DASHBOARD_PORT:-8787}"
      - "127.0.0.1:${VPS_ADMIN_API_PORT:-8788}:${VPS_ADMIN_API_PORT:-8788}"
      - "172.31.255.10:${VPS_SMB_PORT:-1445}:445"
      - "127.0.0.1:${VPS_SFTP_PORT:-2222}:${VPS_SFTP_PORT:-2222}"
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      VPS_ADMIN_DASHBOARD_PORT: "${VPS_ADMIN_DASHBOARD_PORT:-8787}"
      VPS_ADMIN_API_PORT: "${VPS_ADMIN_API_PORT:-8788}"
      VPS_DATA_DIR: "${VPS_DATA_DIR:-/data/vps}"
      VPS_SMB_SHARE_ROOT: "${VPS_SMB_SHARE_ROOT:-/data/vps/smb-share}"
      VPS_ADMIN_WEB_ROOT: "${VPS_ADMIN_WEB_ROOT:-/app/web/vps-public}"
      VPS_API_TOKEN: "${VPS_API_TOKEN}"
      VPS_ADMIN_USERNAME: "${VPS_ADMIN_USERNAME:-admin}"
      VPS_ADMIN_PASSWORD: "${VPS_ADMIN_PASSWORD}"
      VPS_ADMIN_SESSION_SECONDS: "${VPS_ADMIN_SESSION_SECONDS:-43200}"
      VPS_SAMBA_MANAGE_ENABLED: "${VPS_SAMBA_MANAGE_ENABLED:-true}"
      VPS_SAMBA_STREAMS_BACKEND: "${VPS_SAMBA_STREAMS_BACKEND:-xattr}"
      VPS_SMB_PUBLIC_PORT: "${VPS_SMB_PUBLIC_PORT:-445}"
      VPS_SAMBA_CONF_DIR: "${VPS_SAMBA_CONF_DIR:-/etc/samba/smb.conf.d/tm-adapter}"
      VPS_SAMBA_MAIN_CONF: "${VPS_SAMBA_MAIN_CONF:-/etc/samba/smb.conf}"
      VPS_SAMBA_GENERATED_CONF: "${VPS_SAMBA_GENERATED_CONF:-/etc/samba/smb.conf.d/tm-adapter/_generated.conf}"
      VPS_SAMBA_INCLUDE_LINE: "${VPS_SAMBA_INCLUDE_LINE:-include = /etc/samba/smb.conf.d/tm-adapter/_generated.conf}"
      VPS_SAMBA_RESTART_CMD: "${VPS_SAMBA_RESTART_CMD:-smbcontrol all reload-config || pkill -HUP smbd || true}"
      VPS_MOUNT_MANAGE_ENABLED: "${VPS_MOUNT_MANAGE_ENABLED:-true}"
      VPS_MOUNT_POLL_SECONDS: "${VPS_MOUNT_POLL_SECONDS:-30}"
      VPS_RCLONE_CACHE_DIR: "${VPS_RCLONE_CACHE_DIR:-/data/vps/rclone-vfs-cache}"
      VPSD_RCLONE_BINARY: "${VPSD_RCLONE_BINARY:-rclone}"
      VPS_SFTP_PORT: "${VPS_SFTP_PORT:-2222}"
      VPS_SFTP_USERNAME: "${VPS_SFTP_USERNAME:-tmbackup}"
      VPS_SFTP_PASSWORD: "${VPS_SFTP_PASSWORD}"
      VPS_SFTP_UID: "${VPS_SFTP_UID:-10000}"
      VPS_SFTP_GID: "${VPS_SFTP_GID:-10000}"
      VPS_POSTGRES_HOST: "${VPS_POSTGRES_HOST:-postgres}"
      VPS_POSTGRES_PORT: "${VPS_POSTGRES_PORT:-5432}"
      VPS_POSTGRES_DATABASE: "${VPS_POSTGRES_DATABASE:-tm_adapter}"
      VPS_POSTGRES_USER: "${VPS_POSTGRES_USER:-tm_adapter}"
      VPS_POSTGRES_PASSWORD: "${VPS_POSTGRES_PASSWORD}"
      VPS_POSTGRES_SSL_MODE: "${VPS_POSTGRES_SSL_MODE:-disable}"
      VPS_ENTERPRISE_FEATURES_ENABLED_DEFAULT: "${VPS_ENTERPRISE_FEATURES_ENABLED_DEFAULT:-}"
      VPS_ENTERPRISE_FEATURES_ENABLED_FORCE: "${VPS_ENTERPRISE_FEATURES_ENABLED_FORCE:-}"
      VPS_ADMIN_AUTH_MODE_DEFAULT: "${VPS_ADMIN_AUTH_MODE_DEFAULT:-}"
      VPS_ADMIN_AUTH_MODE_FORCE: "${VPS_ADMIN_AUTH_MODE_FORCE:-}"
      VPS_SMB_AUTH_MODE_DEFAULT: "${VPS_SMB_AUTH_MODE_DEFAULT:-}"
      VPS_SMB_AUTH_MODE_FORCE: "${VPS_SMB_AUTH_MODE_FORCE:-}"
      VPS_SFTP_AUTH_MODE_DEFAULT: "${VPS_SFTP_AUTH_MODE_DEFAULT:-}"
      VPS_SFTP_AUTH_MODE_FORCE: "${VPS_SFTP_AUTH_MODE_FORCE:-}"
      VPS_SECURITY_IP_ALLOWLIST_DEFAULT: "${VPS_SECURITY_IP_ALLOWLIST_DEFAULT:-}"
      VPS_SECURITY_IP_ALLOWLIST_FORCE: "${VPS_SECURITY_IP_ALLOWLIST_FORCE:-}"
      VPS_SECURITY_BREAK_GLASS_ENABLED_DEFAULT: "${VPS_SECURITY_BREAK_GLASS_ENABLED_DEFAULT:-}"
      VPS_SECURITY_BREAK_GLASS_ENABLED_FORCE: "${VPS_SECURITY_BREAK_GLASS_ENABLED_FORCE:-}"
      VPS_SECURITY_AUDIT_RETENTION_DAYS_DEFAULT: "${VPS_SECURITY_AUDIT_RETENTION_DAYS_DEFAULT:-}"
      VPS_SECURITY_AUDIT_RETENTION_DAYS_FORCE: "${VPS_SECURITY_AUDIT_RETENTION_DAYS_FORCE:-}"
      VPS_OIDC_ISSUER_DEFAULT: "${VPS_OIDC_ISSUER_DEFAULT:-}"
      VPS_OIDC_ISSUER_FORCE: "${VPS_OIDC_ISSUER_FORCE:-}"
      VPS_OIDC_CLIENT_ID_DEFAULT: "${VPS_OIDC_CLIENT_ID_DEFAULT:-}"
      VPS_OIDC_CLIENT_ID_FORCE: "${VPS_OIDC_CLIENT_ID_FORCE:-}"
      VPS_OIDC_CLIENT_SECRET_DEFAULT: "${VPS_OIDC_CLIENT_SECRET_DEFAULT:-}"
      VPS_OIDC_CLIENT_SECRET_FORCE: "${VPS_OIDC_CLIENT_SECRET_FORCE:-}"
      VPS_OIDC_SCOPES_DEFAULT: "${VPS_OIDC_SCOPES_DEFAULT:-}"
      VPS_OIDC_SCOPES_FORCE: "${VPS_OIDC_SCOPES_FORCE:-}"
      VPS_OIDC_ADMIN_GROUP_DEFAULT: "${VPS_OIDC_ADMIN_GROUP_DEFAULT:-}"
      VPS_OIDC_ADMIN_GROUP_FORCE: "${VPS_OIDC_ADMIN_GROUP_FORCE:-}"
      VPS_OIDC_READONLY_GROUP_DEFAULT: "${VPS_OIDC_READONLY_GROUP_DEFAULT:-}"
      VPS_OIDC_READONLY_GROUP_FORCE: "${VPS_OIDC_READONLY_GROUP_FORCE:-}"
      VPS_DIRECTORY_DOMAIN_DEFAULT: "${VPS_DIRECTORY_DOMAIN_DEFAULT:-}"
      VPS_DIRECTORY_DOMAIN_FORCE: "${VPS_DIRECTORY_DOMAIN_FORCE:-}"
      VPS_DIRECTORY_REALM_DEFAULT: "${VPS_DIRECTORY_REALM_DEFAULT:-}"
      VPS_DIRECTORY_REALM_FORCE: "${VPS_DIRECTORY_REALM_FORCE:-}"
      VPS_DIRECTORY_URL_DEFAULT: "${VPS_DIRECTORY_URL_DEFAULT:-}"
      VPS_DIRECTORY_URL_FORCE: "${VPS_DIRECTORY_URL_FORCE:-}"
      VPS_DIRECTORY_BIND_DN_DEFAULT: "${VPS_DIRECTORY_BIND_DN_DEFAULT:-}"
      VPS_DIRECTORY_BIND_DN_FORCE: "${VPS_DIRECTORY_BIND_DN_FORCE:-}"
      VPS_DIRECTORY_BIND_PASSWORD_DEFAULT: "${VPS_DIRECTORY_BIND_PASSWORD_DEFAULT:-}"
      VPS_DIRECTORY_BIND_PASSWORD_FORCE: "${VPS_DIRECTORY_BIND_PASSWORD_FORCE:-}"
      VPS_WORKGROUP_MAPPINGS_JSON_DEFAULT: "${VPS_WORKGROUP_MAPPINGS_JSON_DEFAULT:-}"
      VPS_WORKGROUP_MAPPINGS_JSON_FORCE: "${VPS_WORKGROUP_MAPPINGS_JSON_FORCE:-}"
      VPS_MOUNT_POLICY_MODE_DEFAULT: "${VPS_MOUNT_POLICY_MODE_DEFAULT:-}"
      VPS_MOUNT_POLICY_MODE_FORCE: "${VPS_MOUNT_POLICY_MODE_FORCE:-}"
      VPS_POSTGRES_ENABLED_DEFAULT: "${VPS_POSTGRES_ENABLED_DEFAULT:-}"
      VPS_POSTGRES_ENABLED_FORCE: "${VPS_POSTGRES_ENABLED_FORCE:-}"
      VPS_POSTGRES_HOST_DEFAULT: "${VPS_POSTGRES_HOST_DEFAULT:-}"
      VPS_POSTGRES_HOST_FORCE: "${VPS_POSTGRES_HOST_FORCE:-}"
      VPS_POSTGRES_PORT_DEFAULT: "${VPS_POSTGRES_PORT_DEFAULT:-}"
      VPS_POSTGRES_PORT_FORCE: "${VPS_POSTGRES_PORT_FORCE:-}"
      VPS_POSTGRES_DATABASE_DEFAULT: "${VPS_POSTGRES_DATABASE_DEFAULT:-}"
      VPS_POSTGRES_DATABASE_FORCE: "${VPS_POSTGRES_DATABASE_FORCE:-}"
      VPS_POSTGRES_USER_DEFAULT: "${VPS_POSTGRES_USER_DEFAULT:-}"
      VPS_POSTGRES_USER_FORCE: "${VPS_POSTGRES_USER_FORCE:-}"
      VPS_POSTGRES_PASSWORD_DEFAULT: "${VPS_POSTGRES_PASSWORD_DEFAULT:-}"
      VPS_POSTGRES_PASSWORD_FORCE: "${VPS_POSTGRES_PASSWORD_FORCE:-}"
      VPS_POSTGRES_SSL_MODE_DEFAULT: "${VPS_POSTGRES_SSL_MODE_DEFAULT:-}"
      VPS_POSTGRES_SSL_MODE_FORCE: "${VPS_POSTGRES_SSL_MODE_FORCE:-}"
    volumes:
      - ./data/vps:${VPS_DATA_DIR:-/data/vps}
      - ./data/mnt:/mnt/tm-cloud
      - ./data/rclone:/root/.config/rclone

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${VPS_POSTGRES_DATABASE:-tm_adapter}"
      POSTGRES_USER: "${VPS_POSTGRES_USER:-tm_adapter}"
      POSTGRES_PASSWORD: "${VPS_POSTGRES_PASSWORD}"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VPS_POSTGRES_USER:-tm_adapter} -d ${VPS_POSTGRES_DATABASE:-tm_adapter}"]
      interval: 5s
      timeout: 5s
      retries: 20
